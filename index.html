<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>你好</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #2c2c2c;
      --paper: #f7f5f0;
      --seal: #c53d43;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      background-color: var(--paper);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Serif SC', 'Songti SC', 'SimSun', serif;
    }

    /* 宣纸纹理 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.4;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 128px 128px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .greeting {
      font-size: clamp(4rem, 15vw, 12rem);
      font-weight: 300;
      color: var(--ink);
      letter-spacing: 0.15em;
      line-height: 1.1;
      opacity: 0;
      transform: translateY(30px);
      animation: emerge 1.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      user-select: none;
      cursor: default;
    }

    /* 朱印 */
    .seal {
      width: clamp(1.5rem, 4vw, 3rem);
      height: clamp(1.5rem, 4vw, 3rem);
      margin-top: 1.5rem;
      border: 2px solid var(--seal);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.8) rotate(-8deg);
      animation: stamp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      animation-delay: 1.4s;
    }

    .seal::after {
      content: '';
      width: 60%;
      height: 60%;
      background-color: var(--seal);
      border-radius: 2px;
      opacity: 0.85;
    }

    @keyframes emerge {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes stamp {
      to {
        opacity: 0.9;
        transform: scale(1) rotate(-8deg);
      }
    }

    /* 微光效果 */
    .greeting::after {
      content: attr(data-text);
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        120deg,
        transparent 30%,
        rgba(255, 255, 255, 0.4) 50%,
        transparent 70%
      );
      background-size: 200% 100%;
      background-position: 100% 0;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shimmer 3s ease-in-out infinite;
      animation-delay: 2s;
      pointer-events: none;
    }

    @keyframes shimmer {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="greeting" data-text="你好">你好</div>
    <div class="seal" aria-hidden="true"></div>
  </div>
</body>
</html>
